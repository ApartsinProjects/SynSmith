attributes:
  intent:
  - card_arrival
  - card_not_working
  - card_payment_fee_charged
  - card_payment_not_recognised
  - card_payment_wrong_exchange_rate
  - card_swallowed
  - declined_card_payment
  - lost_or_stolen_card
  - pending_card_payment
  - top_up_failed
  difficulty:
  - easy
  - medium
  - hard
  ambiguity:
  - low
  - medium
  - high
  style:
  - formal
  - informal
  - fragmented
  - emotional
  - concise
  - verbose
  noise:
  - clean
  - typos
  - missing_details
  - irrelevant_details
  - contradiction
  scenario_type:
  - transaction_issue
  - card_handling
  - general_inquiry
label_attribute: intent
invalid_combinations: []
task_description: 'Classify a banking customer support message into one of ten card
  and

  payment-related intents. The classes share heavy vocabulary overlap

  (card, payment, transaction, declined, blocked), so the classifier must

  rely on fine semantic distinctions rather than keyword matching. Messages

  may be informal, fragmented, ambiguous, contain typos, or include

  irrelevant transaction context. The model must handle realistic banking

  channel input (chat, email, in-app form).

  '
domain: banking77_card_payment
