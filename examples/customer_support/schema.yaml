domain: customer_support
task_description: |
  Classify a customer support message into one of five intents. Messages
  may be informal, fragmented, ambiguous, or contain typos and irrelevant
  details. The model must handle rare phrasings and edge cases.

label_attribute: intent

attributes:
  intent:
    - refund_request
    - technical_problem
    - account_issue
    - complaint
    - general_question

  difficulty:
    - easy
    - medium
    - hard

  ambiguity:
    - low
    - medium
    - high

  style:
    - formal
    - informal
    - fragmented
    - emotional
    - concise
    - verbose

  noise:
    - clean
    - typos
    - missing_details
    - irrelevant_details
    - contradiction

  scenario_type:
    - common
    - rare
    - edge_case

invalid_combinations:
  - difficulty: easy
    ambiguity: high
  - difficulty: hard
    ambiguity: low
    style: concise
